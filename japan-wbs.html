<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본 서비스 런칭 과제 맵</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif; color:#1a1a1a; font-size:15px; background:#fff; }
.wrap { max-width:1250px; margin:0 auto; padding:20px; }

/* Header */
.hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
.hdr h2 { font-size:24px; margin:0 0 3px; }
.hdr .meta { font-size:13px; opacity:.5; }
.hdr-right { display:flex; gap:6px; align-items:center; }
.gear-btn { background:none; border:1px solid #ddd; border-radius:6px; padding:5px 12px; cursor:pointer; font-size:13px; color:#666; }
.gear-btn:hover { background:#f5f5f5; }

/* Settings */
.settings { display:none; background:#fafafa; border:1px solid #e5e7eb; border-radius:8px; padding:16px; margin-bottom:14px; }
.settings.active { display:block; }
.settings label { display:block; font-size:13px; color:#888; margin-bottom:4px; }
.settings input { width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; margin-bottom:10px; }
.settings .hint { font-size:12px; color:#999; margin-top:-6px; margin-bottom:10px; }
.settings .btns { display:flex; gap:6px; }
.btn-sm { padding:6px 14px; border-radius:6px; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:13px; }
.btn-sm.primary { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }

/* Category badges */
.cat-badges { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.cat-badge { padding:5px 10px; border-radius:6px; font-size:12px; }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap; }
.tab-btn { padding:9px 18px; border:none; cursor:pointer; font-size:14px; border-radius:6px; background:transparent; color:#888; font-weight:400; }
.tab-btn.active { background:#1a1a1a; color:#fff; font-weight:700; }

/* Filter pills */
.filters { display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap; }
.filter-pill { padding:4px 10px; border:1px solid #ddd; border-radius:12px; font-size:12px; cursor:pointer; background:transparent; color:#777; transition:all .15s; }
.filter-pill.active { color:#fff; }
.filter-pill.active::before { content:'✓ '; font-size:10px; }

/* Timeline */
.tl-header { display:flex; border-bottom:2px solid #e5e7eb; padding-bottom:4px; margin-bottom:3px; }
.tl-label-col { width:280px; flex-shrink:0; font-size:12px; font-weight:600; opacity:.4; }
.tl-weeks { flex:1; display:flex; }
.tl-week { flex:1; font-size:10px; text-align:center; border-left:1px solid #f3f4f6; }
.tl-week.start { border-left:2px dashed #3B82F6; color:#3B82F6; font-weight:700; opacity:1!important; }
.tl-week.end { border-left:2px dashed #EF4444; color:#EF4444; font-weight:700; opacity:1!important; }
.tl-week .sub { font-size:9px; }

.cat-header { font-size:12px; font-weight:700; padding:8px 0 3px; border-bottom:1px solid #f3f4f6; }
.tl-row { display:flex; align-items:center; height:32px; border-bottom:1px solid #fafafa; }
.tl-row:hover { background:#f8fafc; }
.tl-info { width:280px; flex-shrink:0; display:flex; align-items:center; gap:6px; }
.tl-id { font-size:10px; font-weight:600; opacity:.6; width:38px; }
.tl-name { font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }
.tl-name.critical { font-weight:700; }
.tl-name.done { text-decoration:line-through; }
.tl-status { font-size:9px; padding:2px 5px; border-radius:8px; color:#fff; white-space:nowrap; }
.tl-md { font-size:9px; opacity:.4; }
.tl-bars { flex:1; position:relative; height:20px; }
.tl-bar { position:absolute; height:14px; top:3px; border-radius:3px; cursor:pointer; }
.tl-bar .tooltip { display:none; position:absolute; bottom:17px; left:0; background:#1e293b; color:#fff; padding:4px 8px; border-radius:3px; font-size:11px; white-space:nowrap; z-index:10; box-shadow:0 2px 8px rgba(0,0,0,.2); }
.tl-bar:hover .tooltip { display:block; }
.tl-dep { position:absolute; top:7px; transform:translateX(-8px); font-size:9px; color:#EF4444; }

/* Legend */
.legend { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; font-size:11px; }
.legend-item { display:flex; align-items:center; gap:4px; }
.legend-dot { width:10px; height:10px; border-radius:2px; }

/* Table */
.tbl { width:100%; border-collapse:collapse; font-size:13px; }
.tbl th { padding:7px 8px; text-align:left; font-weight:600; font-size:11px; opacity:.5; border-bottom:2px solid #e5e7eb; }
.tbl td { padding:6px 8px; border-bottom:1px solid #f3f4f6; }
.tbl .cat-tag { font-size:10px; padding:2px 6px; border-radius:8px; color:#fff; }
.tbl .note-cell { font-size:11px; opacity:.5; max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Decisions */
.dec-intro { font-size:13px; opacity:.5; margin:0 0 12px; }
.dec-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-bottom:1px solid #f3f4f6; border-left:3px solid #F59E0B; }
.dec-item.urgent { border-left-color:#EF4444; }
.dec-icon { font-size:20px; width:32px; text-align:center; }
.dec-body { flex:1; }
.dec-title { font-weight:700; font-size:15px; }
.dec-impact { font-size:12px; opacity:.5; margin-top:2px; }
.dec-right { text-align:right; }
.dec-due { font-size:13px; font-weight:700; }
.dec-st { font-size:11px; padding:3px 7px; border-radius:8px; background:#f3f4f6; margin-top:3px; display:inline-block; }

/* Resources */
.res-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; margin-bottom:16px; }
.res-card { border:1px solid #e5e7eb; border-radius:8px; padding:14px; }
.res-team { font-weight:700; font-size:15px; margin-bottom:8px; }
.res-roles { display:flex; gap:5px; flex-wrap:wrap; }
.res-role { padding:3px 9px; border-radius:12px; font-size:12px; }
.res-note { font-size:11px; opacity:.5; margin-top:6px; }
.res-summary { border:1px solid #e5e7eb; border-radius:8px; padding:16px; background:#fafafa; }
.res-summary-title { font-size:15px; font-weight:700; margin-bottom:8px; }
.res-nums { display:flex; gap:24px; flex-wrap:wrap; }
.res-num .big { font-size:26px; font-weight:700; }
.res-num .label { font-size:13px; opacity:.5; }
.res-ext { margin-top:12px; font-size:12px; opacity:.5; }

/* Loading */
.loading { text-align:center; padding:40px; color:#999; font-size:15px; }

/* Responsive */
@media(max-width:900px) {
  .tl-label-col, .tl-info { width:200px; }
  .tl-name { max-width:90px; }
}
</style>
</head>

const SC = {"최우선":"#DC2626","크리티컬":"#DC2626","진행중":"#2563EB","리서치":"#D97706","검토중":"#D97706","설계중":"#D97706","준비중":"#D97706","미착수":"#6B7280","대기":"#9CA3AF","LINE대기":"#9CA3AF","후순위":"#D1D5DB","2순위":"#D1D5DB","목표":"#DC2626","완료":"#059669"};
const CAT_SHORT = {A:"기존",B1:"1순위",B2:"2순위",B3:"3순위",BF:"인프라",C:"회원",D:"사업",Q:"QA"};
const FILTER_BTNS = [["all","전체"],["critical","크리티컬"],["A","기존솔루션"],["B1","1순위"],["B2","2순위"],["B3","3순위"],["BF","인프라"],["C","회원"],["D","사업"],["Q","QA"]];
const MN = 10, MX = 31, TW = MX - MN;

// Build weeks array
const WEEKS = [];
for (let w = 10; w <= 30; w++) {
  const d = new Date(2026, 0, 5 + w * 7);
  WEEKS.push({ num: w, label: (d.getMonth()+1) + "/" + d.getDate() });
}

// ===== STATE =====
let tasks = DEFAULT_TASKS;
let decisions = DEFAULT_DECISIONS;
let resources = DEFAULT_RESOURCES;
let currentTab = "timeline";
let activeFilters = new Set(['all']); // multi-select set

// ===== SETTINGS =====
function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.classList.toggle('active');
  if (p.classList.contains('active')) {
    document.getElementById('sheetIdInput').value = localStorage.getItem('wbs_sheet_id') || '';
  }
}
function saveSettings() {
  const id = document.getElementById('sheetIdInput').value.trim();
  // Extract ID from full URL if pasted
  const m = id.match(/\/d\/([a-zA-Z0-9_-]+)/);
  localStorage.setItem('wbs_sheet_id', m ? m[1] : id);
  document.getElementById('settingsPanel').classList.remove('active');
  reloadData();
}
function clearSettings() {
  localStorage.removeItem('wbs_sheet_id');
  document.getElementById('sheetIdInput').value = '';
  tasks = DEFAULT_TASKS; decisions = DEFAULT_DECISIONS; resources = DEFAULT_RESOURCES;
  renderAll();
}

// ===== DATE → WEEK HELPERS =====
const BASE_DATE_MS = new Date(2026, 0, 5).getTime(); // Jan 5, 2026
const MS_PER_WEEK = 7 * 24 * 60 * 60 * 1000;

function dateToWeek(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  return Math.round((d.getTime() - BASE_DATE_MS) / MS_PER_WEEK);
}

function weekToDateLabel(weekNum) {
  const d = new Date(BASE_DATE_MS + weekNum * MS_PER_WEEK);
  return (d.getMonth()+1) + '/' + d.getDate();
}

// ===== DATA LOADING =====
async function fetchSheet(sheetName) {
  const sid = localStorage.getItem('wbs_sheet_id');
  if (!sid) return null;
  const url = `https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const txt = await r.text();
    return Papa.parse(txt, { header: true, skipEmptyLines: true });
  } catch(e) { return null; }
}

function parseBool(v) {
  if (typeof v === 'boolean') return v;
  if (!v) return false;
  return v.toString().toUpperCase() === 'TRUE';
}

async function reloadData() {
  const sid = localStorage.getItem('wbs_sheet_id');
  if (!sid) { tasks = DEFAULT_TASKS; decisions = DEFAULT_DECISIONS; resources = DEFAULT_RESOURCES; renderAll(); return; }

  const [tRes, dRes, rRes] = await Promise.all([fetchSheet('tasks'), fetchSheet('decisions'), fetchSheet('resources')]);

  if (tRes && tRes.data.length) {
    tasks = tRes.data.map(r => {
      // Date-based: startDate + endDate → s, d
      let s = parseInt(r.startWeek) || 14;
      let d = parseFloat(r.duration) || 1;
      let startDateStr = '', endDateStr = '';
      if (r.startDate) {
        const sw = dateToWeek(r.startDate);
        if (sw !== null) { s = sw; startDateStr = r.startDate; }
      }
      if (r.startDate && r.endDate) {
        const start = new Date(r.startDate), end = new Date(r.endDate);
        if (!isNaN(start) && !isNaN(end)) {
          d = Math.max(0.1, (end.getTime() - start.getTime()) / MS_PER_WEEK);
          endDateStr = r.endDate;
        }
      }
      return {
        id: r.id || '', n: r.name || '', c: r.category || 'A',
        s, d, t: r.team || '', st: r.status || '미착수',
        cr: parseBool(r.critical), dp: r.dependency || '',
        nt: r.note || '', md: parseInt(r.mandays) || 0,
        startDate: startDateStr, endDate: endDateStr
      };
    });
  } else { tasks = DEFAULT_TASKS; }

  if (dRes && dRes.data.length) {
    decisions = dRes.data.map(r => ({
      id: r.id || '', n: r.name || '', due: r.due || '',
      st: r.status || '', imp: r.impact || ''
    }));
  } else { decisions = DEFAULT_DECISIONS; }

  if (rRes && rRes.data.length) {
    resources = rRes.data.map(r => ({
      team: r.team || '', be: parseInt(r.be) || 0, fe: parseInt(r.fe) || 0,
      pm: parseInt(r.pm) || 0, na: parseInt(r.native) || 0,
      ui: parseInt(r.uiux) || 0, qa: parseInt(r.qa) || 0, note: r.note || ''
    }));
  } else { resources = DEFAULT_RESOURCES; }

  renderAll();
}

// ===== TABS =====
function setTab(name) {
  currentTab = name;
  ['timeline','table','decisions','resources'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
}

// ===== RENDER =====
function renderAll() {
  renderHeader();
  renderCatBadges();
  renderTabs();
  renderTimeline();
  renderTable();
  renderDecisions();
  renderResources();
  setTab(currentTab);
}

function renderHeader() {
  const totalMD = tasks.reduce((s, t) => s + t.md, 0);
  document.getElementById('mainTitle').textContent = '\uD83C\uDDEF\uD83C\uDDF5 일본 서비스 런칭 과제 맵';
  document.getElementById('mainMeta').textContent = `7월 중순 런칭 \u00B7 ${tasks.length}개 과제 \u00B7 총 ${totalMD}MD \u00B7 14~17명`;
}

function renderCatBadges() {
  const el = document.getElementById('catBadges');
  el.innerHTML = Object.entries(CN).map(([k, v]) => {
    const md = tasks.filter(t => t.c === k).reduce((s, t) => s + t.md, 0);
    return `<div class="cat-badge" style="background:${CC[k]}18;border:1px solid ${CC[k]}40"><span style="color:${CC[k]};font-weight:700">${v.split(":")[0].split(".")[0]}</span><span style="margin-left:4px;opacity:.6">${md}MD</span></div>`;
  }).join('');
}

function renderTabs() {
  document.getElementById('tabBar').innerHTML = [['timeline','타임라인'],['table','테이블'],['decisions','의사결정'],['resources','리소스']].map(([k, v]) =>
    `<button class="tab-btn${currentTab===k?' active':''}" data-tab="${k}" onclick="setTab('${k}')">${v}</button>`
  ).join('');
}

// ===== TIMELINE =====
function setFilter(f) {
  if (f === 'all') {
    activeFilters = new Set(['all']);
  } else {
    activeFilters.delete('all');
    if (activeFilters.has(f)) {
      activeFilters.delete(f);
    } else {
      activeFilters.add(f);
    }
    if (activeFilters.size === 0) activeFilters = new Set(['all']);
  }
  renderTimeline();
}

function getFiltered() {
  if (activeFilters.has('all')) return tasks;
  return tasks.filter(t => {
    if (activeFilters.has('critical') && t.cr) return true;
    if (activeFilters.has(t.c)) return true;
    return false;
  });
}

function renderTimeline() {
  const el = document.getElementById('tab-timeline');
  const filtered = getFiltered();

  let html = '';
  // Filters — multi-select hint
  html += '<div style="font-size:11px;opacity:.4;margin-bottom:6px">여러 항목 동시 선택 가능</div>';
  html += '<div class="filters">';
  FILTER_BTNS.forEach(([k, v]) => {
    const cnt = k === 'all' ? tasks.length : k === 'critical' ? tasks.filter(t => t.cr).length : tasks.filter(t => t.c === k).length;
    const active = activeFilters.has(k);
    const bg = active ? (CC[k] || '#333') : 'transparent';
    const border = active ? (CC[k] || '#333') : '#ddd';
    const color = active ? '#fff' : '#777';
    html += `<button class="filter-pill${active?' active':''}" style="background:${bg};border-color:${border};color:${color}" onclick="setFilter('${k}')">${v}(${cnt})</button>`;
  });
  html += '</div>';

  // Scrollable timeline
  html += '<div style="overflow-x:auto"><div style="min-width:1100px">';

  // Week header
  html += '<div class="tl-header"><div class="tl-label-col">과제</div><div class="tl-weeks">';
  WEEKS.forEach(w => {
    let cls = '';
    let extra = '';
    if (w.num === 14) { cls = ' start'; extra = '<div class="sub">착수</div>'; }
    if (w.num === 30) { cls = ' end'; extra = '<div class="sub">런칭</div>'; }
    const op = (w.num === 14 || w.num === 30) ? '1' : '.4';
    html += `<div class="tl-week${cls}" style="opacity:${op}">${w.label}${extra}</div>`;
  });
  html += '</div></div>';

  // Categories — show if any task in this cat passes filter
  const cats = Object.entries(CN);
  cats.forEach(([cat, catName]) => {
    const ct = filtered.filter(t => t.c === cat);
    if (!ct.length) return;

    html += `<div class="cat-header" style="color:${CC[cat]}">${catName}</div>`;
    ct.forEach(t => {
      const left = ((t.s - MN) / TW) * 100;
      const width = Math.max((t.d / TW) * 100, 0.6);
      const bg = t.cr ? `linear-gradient(90deg,${CC[t.c]},#EF4444)` : t.st === '완료' ? '#059669' : CC[t.c];
      const op = t.st === '후순위' || t.st === '2순위' ? 0.25 : t.st === '대기' || t.st === 'LINE대기' ? 0.45 : t.st === '완료' ? 1 : 0.8;
      const border = t.cr ? '1px solid #EF4444' : 'none';
      const nameCls = (t.cr ? ' critical' : '') + (t.st === '완료' ? ' done' : '');

      html += `<div class="tl-row"><div class="tl-info">`;
      html += `<span class="tl-id" style="color:${CC[t.c]}">${t.id}</span>`;
      html += `<span class="tl-name${nameCls}">${t.n}</span>`;
      html += `<span class="tl-status" style="background:${SC[t.st]||'#ccc'}">${t.st}</span>`;
      if (t.md > 0) html += `<span class="tl-md">${t.md}MD</span>`;
      html += `</div><div class="tl-bars">`;
      html += `<div class="tl-bar" style="left:${left}%;width:${width}%;background:${bg};opacity:${op};border:${border}">`;
      if (t.nt) html += `<div class="tooltip">${t.nt}</div>`;
      html += `</div>`;
      if (t.dp) html += `<div class="tl-dep" style="left:${left}%">\u25C0</div>`;
      html += `</div></div>`;
    });
  });

  html += '</div></div>';

  // Legend
  html += '<div class="legend">';
  cats.forEach(([k, v]) => {
    html += `<div class="legend-item"><div class="legend-dot" style="background:${CC[k]}"></div>${v.split(":")[0]}</div>`;
  });
  html += `<div class="legend-item"><div class="legend-dot" style="background:linear-gradient(90deg,#7C3AED,#EF4444);border:1px solid #EF4444"></div>크리티컬</div>`;
  html += '</div>';

  el.innerHTML = html;
}

// ===== TABLE =====
function renderTable() {
  const el = document.getElementById('tab-table');
  let html = '<div style="overflow-x:auto"><table class="tbl"><thead><tr>';
  ["ID","과제명","구분","MD","시작","기간","담당","상태","의존성","비고"].forEach(h => {
    html += `<th>${h}</th>`;
  });
  html += '</tr></thead><tbody>';
  tasks.forEach(t => {
    const catLabel = (CN[t.c] || '').split(":")[0].split(".").pop().trim().substring(0, 4);
    html += `<tr>`;
    html += `<td style="font-weight:600;color:${CC[t.c]};font-size:11px">${t.id}</td>`;
    html += `<td style="font-weight:${t.cr?700:400};font-size:13px">${t.n}</td>`;
    html += `<td><span class="cat-tag" style="background:${CC[t.c]}">${catLabel}</span></td>`;
    html += `<td style="text-align:center;font-size:12px">${t.md||'-'}</td>`;
    const startLabel = t.startDate ? t.startDate.replace(/^\d{4}-/, '') : `W${t.s}`;
    const endLabel = t.endDate ? t.endDate.replace(/^\d{4}-/, '') : `+${Math.round(t.d*10)/10}주`;
    html += `<td style="text-align:center;font-size:12px">${startLabel}</td>`;
    html += `<td style="text-align:center;font-size:12px">${endLabel}</td>`;
    html += `<td style="font-size:11px">${t.t}</td>`;
    html += `<td><span class="tl-status" style="background:${SC[t.st]||'#ccc'}">${t.st}</span></td>`;
    html += `<td style="font-size:11px;color:#EF4444">${t.dp}</td>`;
    html += `<td class="note-cell">${t.nt}</td>`;
    html += `</tr>`;
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

// ===== DECISIONS =====
function renderDecisions() {
  const el = document.getElementById('tab-decisions');
  const sorted = [...decisions].sort((a, b) => {
    const p = s => s.includes('3/20') ? 1 : s.includes('3/21') ? 2 : s.includes('3/28') ? 3 : 4;
    return p(a.due) - p(b.due);
  });
  let html = '<p class="dec-intro">의사결정 지연 \u2192 후속 작업 전체 블로킹</p>';
  sorted.forEach(d => {
    const urgent = d.due.includes('3/2');
    const dueColor = d.due.includes('3/20') || d.due.includes('3/21') ? '#EF4444' : '#D97706';
    html += `<div class="dec-item${urgent?' urgent':''}">`;
    html += `<span class="dec-icon">${d.id}</span>`;
    html += `<div class="dec-body"><div class="dec-title">${d.n}</div><div class="dec-impact">영향: ${d.imp}</div></div>`;
    html += `<div class="dec-right"><div class="dec-due" style="color:${dueColor}">${d.due}</div><div class="dec-st">${d.st}</div></div>`;
    html += `</div>`;
  });
  el.innerHTML = html;
}

// ===== RESOURCES =====
function renderResources() {
  const el = document.getElementById('tab-resources');
  const totalMD = tasks.reduce((s, t) => s + t.md, 0);
  let html = '<div class="res-grid">';
  resources.forEach(r => {
    html += `<div class="res-card"><div class="res-team">${r.team}</div><div class="res-roles">`;
    if (r.be > 0) html += `<span class="res-role" style="background:#DBEAFE;color:#1E40AF">BE ${r.be}</span>`;
    if (r.fe > 0) html += `<span class="res-role" style="background:#D1FAE5;color:#065F46">FE ${r.fe}</span>`;
    if (r.pm > 0) html += `<span class="res-role" style="background:#FEF3C7;color:#92400E">PM ${r.pm}</span>`;
    if (r.na > 0) html += `<span class="res-role" style="background:#EDE9FE;color:#5B21B6">Native ${r.na}</span>`;
    if (r.ui > 0) html += `<span class="res-role" style="background:#FCE7F3;color:#9D174D">UI/UX ${r.ui}</span>`;
    if (r.qa > 0) html += `<span class="res-role" style="background:#FEE2E2;color:#991B1B">QA ${r.qa}</span>`;
    html += `</div>`;
    if (r.note) html += `<div class="res-note">${r.note}</div>`;
    html += `</div>`;
  });
  html += '</div>';

  html += `<div class="res-summary"><div class="res-summary-title">인력 총괄</div><div class="res-nums">`;
  html += `<div class="res-num"><span class="big">~12</span><span class="label"> 기존</span></div>`;
  html += `<div class="res-num"><span class="big" style="color:#EF4444">+2~5</span><span class="label"> 충원</span></div>`;
  html += `<div class="res-num"><span class="big" style="color:#2563EB">14~17</span><span class="label"> 총원</span></div>`;
  html += `<div class="res-num"><span class="big" style="color:#7C3AED">${totalMD}+</span><span class="label"> 총 MD</span></div>`;
  html += `</div><div class="res-ext">외부: LINE 구축 ~1,550만원 + 월 ~850만원 \u00B7 포트원 200만원/월 \u00B7 결제수수료 3.5~4%</div></div>`;
  el.innerHTML = html;
}

// ===== URL PARAMS =====
function applyUrlParams() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('sheetId')) {
    localStorage.setItem('wbs_sheet_id', params.get('sheetId'));
  }
  if (params.get('tab') && ['timeline','table','decisions','resources'].includes(params.get('tab'))) {
    currentTab = params.get('tab');
  }
}

// ===== INIT =====
applyUrlParams();
reloadData();
</script>
